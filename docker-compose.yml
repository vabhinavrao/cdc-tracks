version: '3.8'

services:
  eds-postgres:
    image: postgres:16-alpine
    container_name: eds_postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-erp_data}
      POSTGRES_USER: ${POSTGRES_USER:-eds_user}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "127.0.0.1:5433:5432" # Bind to host 5433 to avoid collision with SaveMy75 port 5432
    volumes:
      - eds_postgres_data:/var/lib/postgresql/data
    deploy:
      resources:
        limits:
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-eds_user} -d ${POSTGRES_DB:-erp_data}"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eds_network

  eds-redis:
    image: redis:7-alpine
    container_name: eds_redis
    restart: unless-stopped
    command: redis-server --requirepass ${REDIS_PASSWORD} --maxmemory 64mb --maxmemory-policy noeviction
    ports:
      - "127.0.0.1:6380:6379" # Bind to host 6380 to avoid collision with SaveMy75 port 6379
    deploy:
      resources:
        limits:
          memory: 96M
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eds_network

  eds-api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eds_api
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      eds-postgres:
        condition: service_healthy
      eds-redis:
        condition: service_healthy
    ports:
      - "127.0.0.1:3101:3101"
    environment:
      NODE_ENV: production
      PORT: 3101
      DATABASE_URL: postgresql://${POSTGRES_USER:-eds_user}:${POSTGRES_PASSWORD}@eds-postgres:5432/${POSTGRES_DB:-erp_data}
      REDIS_URL: redis://:${REDIS_PASSWORD}@eds-redis:6379/0
      REDIS_KEY_PREFIX: "eds:"
      BULLMQ_PREFIX: eds
      EDS_ENCRYPTION_KEY: ${EDS_ENCRYPTION_KEY}
      EDS_JWT_SECRET: ${EDS_JWT_SECRET}
      EDS_ADMIN_API_KEY: ${EDS_ADMIN_API_KEY}
      NODE_OPTIONS: "--max-old-space-size=192"
    command: npm run start:api
    deploy:
      resources:
        limits:
          memory: 256M
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3101/health"]
      interval: 10s
      timeout: 5s
      retries: 5
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eds_network

  eds-worker:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: eds_worker
    restart: unless-stopped
    read_only: true
    tmpfs:
      - /tmp
    depends_on:
      eds-postgres:
        condition: service_healthy
      eds-redis:
        condition: service_healthy
    environment:
      NODE_ENV: production
      DATABASE_URL: postgresql://${POSTGRES_USER:-eds_user}:${POSTGRES_PASSWORD}@eds-postgres:5432/${POSTGRES_DB:-erp_data}
      REDIS_URL: redis://:${REDIS_PASSWORD}@eds-redis:6379/0
      REDIS_KEY_PREFIX: "eds:"
      BULLMQ_PREFIX: eds
      EDS_ENCRYPTION_KEY: ${EDS_ENCRYPTION_KEY}
      EDS_JWT_SECRET: ${EDS_JWT_SECRET}
      EDS_ADMIN_API_KEY: ${EDS_ADMIN_API_KEY}
      NODE_OPTIONS: "--max-old-space-size=256"
      EDS_MAX_CONCURRENT_JOBS: 2
      EDS_MAX_ERP_SESSIONS: 2
    command: npm run start:worker
    deploy:
      resources:
        limits:
          memory: 384M
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"
    networks:
      - eds_network

volumes:
  eds_postgres_data:

networks:
  eds_network:
    name: eds_network
